<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수학 문제 풀이기 🧮</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "맑은 고딕", "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #e8eaf6 0%, #f3e5f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(92, 107, 192, 0.15);
      width: 100%;
      max-width: 580px;
      padding: 36px 32px 28px;
    }

    h1 { text-align: center; font-size: 28px; color: #3a3a8c; margin-bottom: 6px; }
    .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }

    /* API 키 영역 */
    .api-row {
      display: flex;
      gap: 8px;
      align-items: center;
      background: #f8f9ff;
      border: 1.5px solid #dde;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 16px;
    }
    .api-row label { font-size: 12px; color: #888; white-space: nowrap; }
    .api-row input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 13px;
      font-family: monospace;
      outline: none;
      color: #333;
    }
    .api-saved { font-size: 12px; color: #43a047; white-space: nowrap; }

    /* 입력 */
    .input-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .input-row input {
      flex: 1; padding: 12px 16px; font-size: 16px; font-family: inherit;
      border: 2px solid #ccd; border-radius: 10px; outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #5c6bc0; }

    .btn-solve {
      padding: 12px 22px; background: #5c6bc0; color: white;
      border: none; border-radius: 10px; font-size: 15px; font-weight: bold;
      font-family: inherit; cursor: pointer; transition: background 0.2s;
    }
    .btn-solve:hover { background: #3f51b5; }

    /* 사진 버튼 */
    .photo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .btn-photo {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px; background: #43a047; color: white;
      border: none; border-radius: 10px; font-size: 14px; font-family: inherit;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-photo:hover { background: #2e7d32; }
    .btn-photo:disabled { background: #bbb; cursor: default; }
    .status { font-size: 13px; color: #888; }
    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid #ccc; border-top-color: #5c6bc0;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    input[type="file"] { display: none; }

    /* 미리보기 */
    .preview-wrap { position: relative; display: inline-block; text-align: center; margin-bottom: 14px; width: 100%; }
    .preview-wrap img { max-width: 100%; max-height: 200px; border-radius: 10px; border: 2px solid #e8eaf6; }
    .btn-clear {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,0.5); color: white;
      border: none; border-radius: 50%; width: 26px; height: 26px;
      font-size: 14px; cursor: pointer; line-height: 26px; text-align: center;
    }
    .btn-clear:hover { background: rgba(0,0,0,0.75); }

    /* 결과 */
    .result-box {
      background: #f8f9ff; border: 1.5px solid #dde; border-radius: 12px;
      padding: 16px 18px; min-height: 110px; font-size: 15px; line-height: 1.9;
      color: #222; white-space: pre-wrap; word-break: break-word; margin-bottom: 22px;
    }
    .result-box.error { color: #c62828; background: #fff3f3; border-color: #ffcdd2; }

    /* 예시 */
    .example-label { font-size: 12px; font-weight: bold; color: #888; margin-bottom: 8px; }
    .example-btns { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn-ex {
      padding: 6px 12px; background: #e8eaf6; color: #3a3a8c;
      border: none; border-radius: 8px; font-size: 13px; font-family: inherit;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-ex:hover { background: #c5cae9; }
  </style>
</head>
<body>
<div id="app">
  <div class="card">
    <h1>수학 문제 풀이기 🧮</h1>
    <p class="subtitle">수식이나 방정식을 입력하고 [풀기] 버튼을 누르세요</p>

    <!-- API 키 입력 -->
    <div class="api-row">
      <label>Claude API 키</label>
      <input
        v-model="apiKeyInput"
        type="password"
        placeholder="sk-ant-... (사진 기능 사용 시 필요)"
        @change="saveKey"
      />
      <span class="api-saved" v-if="apiKey">✓ 저장됨</span>
    </div>

    <!-- 수식 입력 -->
    <div class="input-row">
      <input v-model="problem" type="text" placeholder="예: 2x + 4 = 10" @keyup.enter="solve" />
      <button class="btn-solve" @click="solve">풀기</button>
    </div>

    <!-- 사진 버튼 -->
    <div class="photo-row">
      <button class="btn-photo" @click="$refs.fileInput.click()" :disabled="!apiKey || loading">
        📷 사진으로 문제 풀기
      </button>
      <span class="status">
        <span v-if="loading"><span class="spinner"></span>{{ statusMsg }}</span>
        <span v-else-if="!apiKey" style="color:#f57c00">← API 키를 입력하면 활성화돼요</span>
      </span>
      <input ref="fileInput" type="file" accept="image/*" @change="uploadPhoto" />
    </div>

    <!-- 미리보기 -->
    <div class="preview-wrap" v-if="previewUrl">
      <img :src="previewUrl" alt="업로드된 사진" />
      <button class="btn-clear" @click="clearPhoto">✕</button>
    </div>

    <!-- 결과 -->
    <div class="result-box" :class="{ error: isError }">
      {{ result || '문제를 입력해 주세요.' }}
    </div>

    <!-- 예시 -->
    <div class="example-label">예시 문제</div>
    <div class="example-btns">
      <button v-for="ex in examples" :key="ex" class="btn-ex" @click="fillExample(ex)">{{ ex }}</button>
    </div>
  </div>
</div>

<script>
const { createApp, ref, onMounted } = Vue;

createApp({
  setup() {
    const problem = ref('');
    const result = ref('');
    const isError = ref(false);
    const apiKeyInput = ref('');
    const apiKey = ref('');
    const loading = ref(false);
    const statusMsg = ref('');
    const previewUrl = ref('');

    const examples = ['125 ÷ 5 + 3', 'sqrt(144)', '2x + 4 = 10', '3x - 7 = 11', 'sin(30 * pi / 180)', '2^10'];

    onMounted(() => {
      const saved = sessionStorage.getItem('claude_api_key');
      if (saved) { apiKey.value = saved; apiKeyInput.value = saved; }
    });

    function saveKey() {
      apiKey.value = apiKeyInput.value.trim();
      if (apiKey.value) sessionStorage.setItem('claude_api_key', apiKey.value);
    }

    // ── 수학 계산 엔진 ──────────────────────────────────────────────────────

    const SAFE = {
      sqrt: Math.sqrt, cbrt: Math.cbrt,
      sin: Math.sin, cos: Math.cos, tan: Math.tan,
      log: Math.log10, ln: Math.log,
      abs: Math.abs, round: Math.round, floor: Math.floor, ceil: Math.ceil,
      pow: Math.pow, pi: Math.PI, e: Math.E,
    };

    function factorial(n) {
      n = Math.round(n);
      if (n < 0 || n > 20) throw new Error('범위 초과');
      return n <= 1 ? 1 : n * factorial(n - 1);
    }

    function preprocess(expr) {
      expr = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/\^/g, '**');
      const sup = {'⁰':'0','¹':'1','²':'2','³':'3','⁴':'4','⁵':'5','⁶':'6','⁷':'7','⁸':'8','⁹':'9'};
      expr = expr.replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹]+/g, m => '**' + m.split('').map(c => sup[c]).join(''));
      expr = expr.replace(/(\d+)!/g, 'factorial($1)');
      expr = expr.replace(/(\d)(sqrt|cbrt|sin|cos|tan|log|ln|abs)/g, '$1*$2');
      return expr;
    }

    function safeEval(expr) {
      const fn = new Function(...Object.keys(SAFE), 'factorial', `"use strict"; return (${expr});`);
      return fn(...Object.values(SAFE), factorial);
    }

    function solveLinear(left, rightVal) {
      left = left.replace(/\s/g, '').toLowerCase();
      const m = left.match(/^([+-]?\d*\.?\d*)x([+-]\d+\.?\d*)?$/);
      if (!m) return '일차방정식 형태(예: 2x + 4 = 10)만 지원해요.';
      let a = m[1], b = m[2] || '0';
      a = (a === '' || a === '+') ? 1 : (a === '-' ? -1 : parseFloat(a));
      b = parseFloat(b);
      if (a === 0) return 'x의 계수가 0이라 풀 수 없어요.';
      const x = (rightVal - b) / a;
      const xd = Number.isInteger(x) ? x : Math.round(x * 10000) / 10000;
      return `x = ${xd}\n\n풀이 과정:\n  ${left} = ${rightVal}\n  ${a}x = ${rightVal} - (${b}) = ${rightVal - b}\n  x = ${rightVal - b} ÷ ${a} = ${xd}`;
    }

    function solveEquation(prob) {
      const sides = prob.split('=');
      if (sides.length !== 2) return '방정식 형식이 맞지 않아요.';
      const [left, right] = sides.map(s => s.trim());
      let rightVal;
      try { rightVal = safeEval(preprocess(right)); } catch { return '등호 오른쪽을 계산할 수 없어요.'; }
      if (/x/i.test(left)) return solveLinear(left, rightVal);
      try {
        const leftVal = safeEval(preprocess(left));
        return leftVal === rightVal ? `참! 양쪽 모두 ${leftVal}이에요.` : `거짓. 왼쪽은 ${leftVal}, 오른쪽은 ${rightVal}이에요.`;
      } catch { return '계산할 수 없어요.'; }
    }

    function solveProblem(prob) {
      prob = prob.trim();
      if (!prob) return { text: '문제를 입력해 주세요.', error: false };
      if (prob.includes('=') && !prob.startsWith('=')) return { text: solveEquation(prob), error: false };
      try {
        let val = safeEval(preprocess(prob));
        if (typeof val === 'number') val = Math.round(val * 1e10) / 1e10;
        return { text: `답: ${val}`, error: false };
      } catch {
        return { text: '풀 수 없는 문제예요. 수식을 다시 확인해 보세요.\n\n예시:\n  3 + 5\n  12 / 4\n  sqrt(16)\n  2x + 4 = 10', error: true };
      }
    }

    function solve() {
      const { text, error } = solveProblem(problem.value);
      result.value = text; isError.value = error;
    }

    function fillExample(ex) { problem.value = ex.trim(); solve(); }

    // ── 사진 인식 (Claude API 직접 호출) ───────────────────────────────────

    async function uploadPhoto(e) {
      const file = e.target.files[0];
      if (!file) return;
      previewUrl.value = URL.createObjectURL(file);
      loading.value = true; statusMsg.value = '사진 읽는 중...'; isError.value = false; result.value = '';

      const reader = new FileReader();
      reader.onload = async () => {
        const base64 = reader.result.split(',')[1];
        const mediaType = file.type || 'image/jpeg';
        try {
          const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': apiKey.value,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true',
            },
            body: JSON.stringify({
              model: 'claude-opus-4-8',
              max_tokens: 256,
              messages: [{
                role: 'user',
                content: [
                  { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
                  { type: 'text', text: '이 사진에서 수학 문제나 수식을 찾아서 텍스트로만 적어줘. 설명 없이 수식이나 방정식만 딱 한 줄로 출력해. 예: 3 + 5  또는  2x + 4 = 10  또는  sqrt(16)' },
                ],
              }],
            }),
          });
          const data = await res.json();
          if (!res.ok) { result.value = data.error?.message || '오류가 발생했어요.'; isError.value = true; return; }
          const extracted = data.content.find(b => b.type === 'text')?.text?.trim() || '';
          if (!extracted) { result.value = '사진에서 수식을 찾지 못했어요.'; isError.value = true; return; }
          problem.value = extracted;
          const { text, error } = solveProblem(extracted);
          result.value = `[사진에서 읽은 문제] ${extracted}\n\n${text}`;
          isError.value = error;
        } catch (err) {
          result.value = '오류: ' + err.message; isError.value = true;
        } finally {
          loading.value = false; statusMsg.value = ''; e.target.value = '';
        }
      };
      reader.readAsDataURL(file);
    }

    function clearPhoto() { previewUrl.value = ''; result.value = ''; problem.value = ''; isError.value = false; }

    return { problem, result, isError, apiKeyInput, apiKey, loading, statusMsg, previewUrl, examples, saveKey, solve, fillExample, uploadPhoto, clearPhoto };
  }
}).mount('#app');
</script>
</body>
</html>
