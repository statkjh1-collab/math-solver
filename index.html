<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수학 문제 풀이기 🧮</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "맑은 고딕", "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #e8eaf6 0%, #f3e5f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(92, 107, 192, 0.15);
      width: 100%;
      max-width: 580px;
      padding: 36px 32px 28px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      color: #3a3a8c;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      font-size: 16px;
      font-family: inherit;
      border: 2px solid #ccd;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #5c6bc0; }

    .btn-solve {
      padding: 12px 22px;
      background: #5c6bc0;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-solve:hover { background: #3f51b5; }

    .result-box {
      background: #f8f9ff;
      border: 1.5px solid #dde;
      border-radius: 12px;
      padding: 16px 18px;
      min-height: 110px;
      font-size: 15px;
      line-height: 1.9;
      color: #222;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 22px;
    }

    .result-box.error { color: #c62828; background: #fff3f3; border-color: #ffcdd2; }

    .example-label {
      font-size: 12px;
      font-weight: bold;
      color: #888;
      margin-bottom: 8px;
    }

    .example-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn-ex {
      padding: 6px 12px;
      background: #e8eaf6;
      color: #3a3a8c;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-ex:hover { background: #c5cae9; }

    .answer-highlight {
      font-size: 22px;
      font-weight: bold;
      color: #3a3a8c;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="card">
    <h1>수학 문제 풀이기 🧮</h1>
    <p class="subtitle">수식이나 방정식을 입력하고 [풀기] 버튼을 누르세요</p>

    <div class="input-row">
      <input
        v-model="problem"
        type="text"
        placeholder="예: 2x + 4 = 10"
        @keyup.enter="solve"
      />
      <button class="btn-solve" @click="solve">풀기</button>
    </div>

    <div class="result-box" :class="{ error: isError }">{{ result || '문제를 입력해 주세요.' }}</div>

    <div class="example-label">예시 문제</div>
    <div class="example-btns">
      <button v-for="ex in examples" :key="ex" class="btn-ex" @click="fillExample(ex)">{{ ex }}</button>
    </div>
  </div>
</div>

<script>
const { createApp, ref } = Vue;

createApp({
  setup() {
    const problem = ref('');
    const result = ref('');
    const isError = ref(false);

    const examples = [
      '125 ÷ 5 + 3', 'sqrt(144)', '2x + 4 = 10',
      '3x - 7 = 11', 'sin(30 * pi / 180)', '2^10', '3! ',
    ];

    // ── 수학 계산 엔진 (JavaScript) ─────────────────────────────────────────

    const SAFE = {
      sqrt: Math.sqrt, cbrt: Math.cbrt,
      sin: Math.sin, cos: Math.cos, tan: Math.tan,
      asin: Math.asin, acos: Math.acos, atan: Math.atan,
      log: Math.log10, ln: Math.log, log2: Math.log2,
      abs: Math.abs, round: Math.round, floor: Math.floor, ceil: Math.ceil,
      pow: Math.pow,
      pi: Math.PI, e: Math.E,
    };

    function factorial(n) {
      n = Math.round(n);
      if (n < 0) throw new Error('음수 팩토리얼');
      if (n > 20) throw new Error('너무 큰 수');
      return n <= 1 ? 1 : n * factorial(n - 1);
    }

    function preprocess(expr) {
      // 특수 기호 변환
      expr = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/\^/g, '**');
      // 유니코드 위첨자
      const sup = {'⁰':'0','¹':'1','²':'2','³':'3','⁴':'4','⁵':'5','⁶':'6','⁷':'7','⁸':'8','⁹':'9'};
      expr = expr.replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹]+/g, m => '**' + m.split('').map(c => sup[c]).join(''));
      // 팩토리얼 (예: 5! → factorial(5))
      expr = expr.replace(/(\d+)!/g, 'factorial($1)');
      // 숫자 바로 뒤 함수 (예: 2sqrt → 2*sqrt)
      expr = expr.replace(/(\d)(sqrt|cbrt|sin|cos|tan|log|ln|abs)/g, '$1*$2');
      return expr;
    }

    function safeEval(expr) {
      const fn = new Function(
        ...Object.keys(SAFE), 'factorial',
        `"use strict"; return (${expr});`
      );
      return fn(...Object.values(SAFE), factorial);
    }

    function solveLinear(left, rightVal) {
      left = left.replace(/\s/g, '').toLowerCase();
      const m = left.match(/^([+-]?\d*\.?\d*)x([+-]\d+\.?\d*)?$/);
      if (!m) return '일차방정식 형태(예: 2x + 4 = 10)만 지원해요.';
      let a = m[1], b = m[2] || '0';
      a = (a === '' || a === '+') ? 1 : (a === '-' ? -1 : parseFloat(a));
      b = parseFloat(b);
      if (a === 0) return 'x의 계수가 0이라 풀 수 없어요.';
      const x = (rightVal - b) / a;
      const xd = Number.isInteger(x) ? x : Math.round(x * 10000) / 10000;
      return `x = ${xd}\n\n풀이 과정:\n  ${left} = ${rightVal}\n  ${a}x = ${rightVal} - (${b}) = ${rightVal - b}\n  x = ${rightVal - b} ÷ ${a} = ${xd}`;
    }

    function solveEquation(prob) {
      const sides = prob.split('=');
      if (sides.length !== 2) return '방정식 형식이 맞지 않아요. 예: 2x + 4 = 10';
      const [left, right] = sides.map(s => s.trim());
      let rightVal;
      try { rightVal = safeEval(preprocess(right)); } catch { return '등호 오른쪽을 계산할 수 없어요.'; }
      if (/x/i.test(left)) return solveLinear(left, rightVal);
      try {
        const leftVal = safeEval(preprocess(left));
        return leftVal === rightVal
          ? `참! 양쪽 모두 ${leftVal}이에요.`
          : `거짓. 왼쪽은 ${leftVal}, 오른쪽은 ${rightVal}이에요.`;
      } catch { return '계산할 수 없어요.'; }
    }

    function solveProblem(prob) {
      prob = prob.trim();
      if (!prob) return { text: '문제를 입력해 주세요.', error: false };
      if (prob.includes('=') && !prob.startsWith('=')) {
        return { text: solveEquation(prob), error: false };
      }
      try {
        let val = safeEval(preprocess(prob));
        if (typeof val === 'number' && Number.isInteger(val)) val = val;
        else if (typeof val === 'number') val = Math.round(val * 1e10) / 1e10;
        return { text: `답: ${val}`, error: false };
      } catch {
        return {
          text: '풀 수 없는 문제예요. 수식을 다시 확인해 보세요.\n\n예시:\n  3 + 5\n  12 / 4\n  sqrt(16)\n  2x + 4 = 10',
          error: true,
        };
      }
    }

    // ── 버튼 동작 ──────────────────────────────────────────────────────────

    function solve() {
      const { text, error } = solveProblem(problem.value);
      result.value = text;
      isError.value = error;
    }

    function fillExample(ex) {
      problem.value = ex.trim();
      solve();
    }

    return { problem, result, isError, examples, solve, fillExample };
  }
}).mount('#app');
</script>
</body>
</html>
